name: Deploy to EC2

on:
  push:
    branches:
      - main  # O la rama que uses

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
  uses: appleboy/ssh-action@master
  with:
    host: ${{ secrets.HOST }}
    username: ubuntu
    key: ${{ secrets.KEY }}
    port: 22
    command_timeout: 20m  # Aumentamos a 20 minutos por si el build es lento
    script: |
      cd ~/Zafiro_Frontend
      git pull origin main
      npm install
      npm run build
      pm2 restart all || pm2 start npm --name "zafiro" -- start
