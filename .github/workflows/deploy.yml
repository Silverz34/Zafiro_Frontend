name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 40m 
          script: |
            echo "Iniciando deploy..."
            
            #1 limpieza del archivo
            rm -f /home/ubuntu/package-lock.json

            #2 navegación
            cd ~/Zafiro_Frontend || { echo "Carpeta no encontrada"; exit 1; }

            #3 limpiar y actualizar
            git stash
            git pull origin main

            #4 intalacion limpia
            echo "intalando dependencias..."
            npm install --no-audit --no-fund

            #5contruccion de la aplicación
            echo "Construyendo proyecto (esto puede tardar)..."
            export NEXT_TELEMETRY_DISABLED=1
            export NODE_OPTIONS="--max-old-space-size=2048"

            #6 ejecucion
            npm run build || { echo "Error en el build"; exit 1; }

            #7 reinicio del servidor
            echo "Actualizando procesos..."
            pm2 restart zafiro || pm2 start npm --name "zafiro" -- start
            pm2 save
            
            echo "Deploy completado exitosamente!"