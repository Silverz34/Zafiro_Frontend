name: Deploy to EC2

on:
  push:
    branches:
      - main  # O la rama que uses

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 20m 
          script: |

            cd ~/Zafiro_Frontend
            npm install
            pm2 restart all
            git pull origin main
            npm install
            npm run build
            pm2 restart all